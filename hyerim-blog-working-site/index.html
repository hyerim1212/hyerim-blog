<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="정혜림의 학교생활, 프로젝트, 개인 공부 기록"
    />
    <meta property="og:title" content="hyerim-record.com" />
    <meta
      property="og:description"
      content="정혜림의 학교생활, 프로젝트, 개인 공부 기록"
    />
    <title>hyerim-record.com</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="logo" href="#top">hyerim-record</a>
      <nav id="navigation" aria-label="주요 메뉴"></nav>
    </header>

    <main id="top">
      <section class="hero">
        <p class="eyebrow">DGIST freshman record</p>
        <h1>학교생활과 프로젝트를 차분히 기록합니다.</h1>
        <p class="hero-description">
          1학년 1학기의 시뮬레이션 구현 활동, 로봇 팔 제작 활동, 그리고
          개인적으로 공부한 내용을 한 곳에 정리합니다.
        </p>
        <div class="hero-actions">
          <a class="button primary" href="#projects">프로젝트 보기</a>
          <a class="button secondary" href="#study-log">공부 기록 보기</a>
        </div>
      </section>

      <section id="school-life" class="section">
        <div class="section-heading">
          <p class="eyebrow">School Life</p>
          <h2>1학년 1학기 기록</h2>
        </div>
        <div id="featured" class="card-grid"></div>
      </section>

      <section id="projects" class="section">
        <div class="section-heading">
          <p class="eyebrow">Projects</p>
          <h2>활동 프로젝트</h2>
        </div>
        <div id="project-list" class="card-grid"></div>
      </section>

      <section id="study-log" class="section">
        <div class="section-heading">
          <p class="eyebrow">Study Log</p>
          <h2>개인 공부 기록</h2>
        </div>
        <div id="study-list" class="card-grid"></div>
      </section>

      <section id="about" class="section timeline-section">
        <div class="section-heading">
          <p class="eyebrow">About</p>
          <h2>정혜림</h2>
          <p>
            DGIST에서 배우고 만드는 과정을 기록합니다. 작은 실험과 시행착오도
            나중에 다시 읽을 수 있는 자료가 되도록 남깁니다.
          </p>
        </div>
        <div id="timeline" class="timeline"></div>
      </section>
    </main>

    <footer class="site-footer">
      <p id="footer-text"></p>
    </footer>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
